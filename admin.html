<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
body{background:#121315;color:#fff;padding:20px;}
input,textarea{width:100%;background:#1a1b1f;border:1px solid #333;color:#fff;padding:10px;margin:8px 0;}
button{padding:8px 15px;margin:3px;cursor:pointer;}
.lock{text-align:center;margin-top:100px;}
</style>
</head>
<body>

<div class="lock" id="lock">
  <h2>后台需密码</h2>
  <input type="password" id="pwd" placeholder="输入密码">
  <button onclick="login()">进入</button>
</div>

<div id="box" style="display:none;">
  <h3>新增文章</h3>
  <input id="t" placeholder="文章标题">
  <textarea id="c" rows="6" placeholder="文章内容"></textarea>
  <button onclick="add()">添加</button>
  <button onclick="save()">下载保存文件</button>
  <div id="list"></div>
</div>

<script>
const pwdCode = "123456";
let list = [];

function login(){
  if(document.getElementById("pwd").value === pwdCode){
    document.getElementById("lock").style.display="none";
    document.getElementById("box").style.display="block";
    loadData();
  }else{
    alert("密码错误");
  }
}

function loadData(){
fetch("articles.json")
.then(res=>res.json())
.then(arr=>{
  list = arr;
  showList();
})
}

function showList(){
  let html = "";
  list.forEach((item,i)=>{
    html += `<div style="background:#1a1b1f;padding:10px;margin:10px 0;">
      ${item.title}
      <br>
      <button onclick="del(${i})">删除</button>
      <button onclick="copy('${location.origin}/art.html?id=${i}')">复制分享链接</button>
    </div>`
  })
  document.getElementById("list").innerHTML = html;
}

function add(){
  let t = document.getElementById("t").value;
  let c = document.getElementById("c").value.replaceAll("\n","<br>");
  list.unshift({title:t,content:c});
  showList();
  alert("添加好了，记得点下载保存");
}
function del(i){list.splice(i,1);showList();}
function copy(url){navigator.clipboard.writeText(url);alert("链接已复制，分享出去就是标题卡片")}
function save(){
  let blob = new Blob([JSON.stringify(list,null,2)]);
  let a = document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="articles.json";
  a.click();
}
</script>
</body>
</html>
