<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="">
<meta property="og:description" content="">
<title>文章详情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{background:#121315;color:#e0e0e0}
  nav{position:fixed;top:0;width:100%;background:#1a1b1f;padding:18px 0;}
  .nav-wrap{width:90%;max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:20px;font-weight:bold;color:#00ccff}
  .back{color:#ccc;text-decoration:none}
  .container{width:90%;max-width:800px;margin:0 auto;padding:100px 20px}
  .title{font-size:26px;color:#fff;margin-bottom:30px}
  .content{line-height:2;font-size:16px;color:#ccc}
</style>
</head>
<body>
<nav>
  <div class="nav-wrap">
    <div class="logo">鹏</div>
    <a class="back" href="index.html">← 返回</a>
  </div>
</nav>

<div class="container">
  <h1 class="title" id="artTitle"></h1>
  <div class="content" id="artContent"></div>
</div>

<script>
const id = new URL(location.href).searchParams.get("id") || 0;
fetch("articles.json").then(res=>res.json()).then(arr=>{
  let data = arr[id];
  document.title = data.title;
  document.querySelector('meta[property="og:title"]').content = data.title;
  document.querySelector('meta[property="og:description"]').content = data.content.replace(/<br>/g,"");
  document.getElementById("artTitle").innerText = data.title;
  document.getElementById("artContent").innerHTML = data.content;
})
</script>
</body>
</html>
