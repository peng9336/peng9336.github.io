<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我在互联网的小角落</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{background:#121315;color:#e0e0e0}
  nav{position:fixed;top:0;width:100%;background:#1a1b1f;padding:18px 0;box-shadow:0 4px 10px rgba(0,0,0,.3);z-index:99}
  .nav-wrap{width:90%;max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:20px;font-weight:bold;color:#00ccff}
  .menu a{color:#ccc;margin-left:14px;text-decoration:none;font-size:15px}
  .menu a:hover{color:#00ccff}
  .hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(to bottom right,#121315,#1a1b1f);padding:0 20px;margin-top:60px}
  .avatar{width:140px;height:140px;border-radius:50%;border:3px solid #00ccff;margin-bottom:20px;object-fit:cover}
  .hero p{font-size:20px;color:#fff;margin-bottom:30px}
  .btn{padding:10px 24px;background:#00ccff;color:#121315;border-radius:6px;text-decoration:none;font-weight:bold}
  .section{width:90%;max-width:800px;margin:0 auto;padding:60px 0}
  .section h2{font-size:24px;margin-bottom:20px;color:#fff;text-align:center}
  .card{background:#1a1b1f;padding:24px;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.2);text-align:center;font-size:18px;line-height:1.8;margin-bottom:20px}
  .article-card{background:#1a1b1f;padding:24px;border-radius:10px;margin-bottom:16px;text-align:left;line-height:1.8}
  .article-card h3{color:#00ccff;margin-bottom:12px;font-size:19px;cursor:pointer}
  .article-card h3:hover{text-decoration:underline}
  .article-card p{color:#e0e0e0;font-size:16px;margin:6px 0;}
  footer{text-align:center;padding:30px 0;color:#666;background:#121315}
  a{color:#00ccff;text-decoration:none}
</style>
</head>
<body>

<nav>
  <div class="nav-wrap">
    <div class="logo">鹏</div>
    <div class="menu">
      <a href="#home">首页</a>
      <a href="#about">关于我</a>
      <a href="#articles">文章</a>
      <a href="#contact">联系我</a>
      <a href="admin.html">写文章</a>
    </div>
  </div>
</nav>

<section class="hero" id="home">
  <div>
    <img class="avatar" src="https://picsum.photos/200/200" alt="avatar">
    <p>热爱生活 | 专注做事 | 不断成长</p>
    <a class="btn" href="#articles">查看文章</a>
  </div>
</section>

<section class="section" id="about">
  <h2>关于我</h2>
  <div class="card">不油腻的皮囊 绝对有趣的灵魂</div>
</section>

<section class="section" id="articles">
  <h2>文章分享</h2>
  <div id="articleList"></div>
</section>

<section class="section" id="contact">
  <h2>联系我</h2>
  <div class="card">
    <p><a href="https://qm.qq.com/cgi-bin/qm/qr?k=1445009336" target="_blank">QQ：1445009336</a></p>
    <br>
    <p><a href="https://x.com/peng9336" target="_blank">Twitter：peng9336</a></p>
  </div>
</section>

<footer>© 2026 鹏</footer>

<script>
fetch("articles.json")
.then(res => res.json())
.then(list => {
  let html = "";
  list.forEach((item, idx) => {
    html += `
    <div class="article-card">
      <h3 onclick="location.href='art.html?id=${idx}'">${idx + 1} ${item.title}</h3>
      ${item.content}
    </div>
    `;
  })
  document.getElementById("articleList").innerHTML = html;
})
</script>

</body>
</html>
